<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="TelePromptr - LLM Telemetry Platform" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />

		<!-- Anti-flash: apply dark class before first paint -->
		<script>
			(function () {
				const key = 'telepromptr-theme';
				let mode;
				try {
					mode = localStorage.getItem(key);
				} catch (_) {}
				const prefersDark =
					mode === 'dark' ||
					(mode !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
				if (prefersDark) {
					document.documentElement.classList.add('dark');
				}
			})();
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<a href="#main-content" class="skip-to-content">Skip to content</a>
		<div style="display: contents">%sveltekit.body%</div>
		<div aria-live="polite" aria-atomic="true" class="sr-live-region" id="live-region"></div>
	</body>
</html>
